<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>


    <div class="booking-container" id="booking-container">
        
        <header class="main-header">
            <h1><img src="image/logo2.png" alt="">&nbsp; HOTEL BOOKING</h1>
            <p>Please fill in the details below to check availability and book your stay.</p>
           
        </header>

        <main class="booking-card">
            <div class="card-header">
                <h2> BOOK YOUR STAY  <i class="fa-solid fa-bed"></i></h2>

                <a href="index.html"> <button class="returnbtn">
                   <!-- <i class="fa-solid fa-arrow-rotate-left"></i> -->
                    <i class="fa-solid fa-bars"></i> 
                </button></a>
                
            </div>

            <form class="booking-form">
                
                <div class="form-grid grid-3">


                    <div class="form-group">
                        <label>ROOMS</label>
                        <div class="input-wrapper select-wrapper">
                            <i class="fa-solid fa-bed input-icon"></i>
                            <select class="select">
                                <option>1 Room</option>
                                <option>2 Rooms</option>
                                <option>3 Rooms</option>
                            </select>
                        </div>
                    </div>







                    <!-- <div class="form-group span-2-desktop">
                        <label>DESTINATION /</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-location-dot input-icon"></i>
                            <input type="text" placeholder="Enter city, hotel or destination">
                        </div>
                    </div> -->


                    <div class="form-group">
                        <label>CHECK-IN DATE</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-calendar-days input-icon"></i>
                            <input type="text" placeholder="Select check-in date" onfocus="(this.type='date')">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>CHECK-OUT DATE</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-calendar-days input-icon"></i>
                            <input type="text" placeholder="Select check-out date" onfocus="(this.type='date')">
                        </div>
                    </div>
                </div>

                <div class="form-grid grid-4-search">



                    <div class="form-group span-2-desktop">
                        <label>DESTINATION </label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-location-dot input-icon"></i>
                            <input type="text" placeholder="Enter city, hotel or destination">
                        </div>
                    </div>


                    <div class="form-group">
                        <label>ADULTS</label>
                        <div class="input-wrapper select-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <select class="select">
                                <option>1 Adult</option>
                                <option selected>2 Adults</option>
                                <option>3 Adults</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>CHILDREN </label>
                        <div class="input-wrapper select-wrapper">
                            <i class="fa-solid fa-child input-icon"></i>
                            <select class="select">
                                <option selected>0 Children</option>
                                <option>1 Child</option>
                                <option>2 Children</option>
                            </select>
                        </div>
                        <!-- <small class="helper-text">Age of children at time of stay</small> -->
                    </div>

                    <!-- <div class="form-group search-btn-container">
                        <button type="submit" class="btn-search">
                            <i class="fa-solid fa-magnifying-glass"></i> SEARCH HOTELS
                        </button>
                    </div> -->
                </div>

                <hr class="section-divider">

                <h3 class="section-title">GUEST DETAILS</h3>
                
                <div class="form-grid grid-2">
                    <div class="form-group">
                        <label>FULL NAME</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input type="text" placeholder="Enter full name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>EMAIL ADDRESS</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope input-icon"></i>
                            <input type="email" placeholder="Enter email address">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>PHONE NUMBER</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone input-icon"></i>
                            <input type="tel" placeholder="Enter phone number">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>COUNTRY / REGION</label>
                        <div class="input-wrapper select-wrapper">
                            <i class="fa-solid fa-earth-americas input-icon"></i>
                            <select class="select">
                                <option value="" disabled selected>Select country / region</option>
                                <option>United States</option>
                                <option>United Kingdom</option>
                                <option>Canada</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                </div>


                  
                <section class="booking" id="booking">

                    <div class="form-group">
                         <label>ROOM TYPE</label>

                            <div class="input-wrapper select-wrapper">
                                <i class="fa-solid fa-bed input-icon"></i>
                                <select class="select">
                                    <option value="">select Rooms</option>
                                    <option value="Deluxe">Deluxe Room</option>
                                    <option value="Junior">Junior Suite</option>
                                    <option value="Executive">Executive Suite</option> 
                                </select>

                             </div>
                    </div>

                    <div class="form-group">
                        <label>SELECT ROOM NO</label>
                            <div class="input-wrapper select-wrapper">
                                <i class="fa-solid fa-bed input-icon"></i>
                                <select class="roomNumber">
                                        
                                    <option value="number">select Room Number</option>
                                </select>
                            </div>
                    </div>

                </section>






                <hr class="section-divider">

                <h3 class="section-title">ADDITIONAL PREFERENCES (OPTIONAL)</h3>
                
                <div class="form-grid grid-2">

                    <div class="form-group">
                        <label>SPECIAL REQUESTS</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-comment-dots input-icon"></i>
                            <input type="text" placeholder="Any special requests?">
                        </div>
                    </div>

                </div>


               <button type="submit" class="submitbtn">submit</button>


                <div class="security-banner">
                    <i class="fa-solid fa-shield-halved security-icon"></i>
                    <div>
                        <strong>SAFE & SECURE BOOKING</strong>
                        <p>Your information is protected and your booking is safe with us.</p>
                    </div>
                </div>


                

            </form>
        </main>
    </div>

    
</body>
